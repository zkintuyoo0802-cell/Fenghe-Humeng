    hr1.appendChild(document.createElement("th")).textContent = "合并FCF";
    names.forEach(function (nm) {
      var th = document.createElement("th");
      th.textContent = nm.length > 14 ? nm.slice(0, 12) + "…" : nm;
      hr1.appendChild(th);
    });
    thead1.appendChild(hr1);
    var tbody1 = document.createElement("tbody");
    yw.forEach(function (row) {
      var tr = document.createElement("tr");
      tr.appendChild(document.createElement("td")).textContent = row.period || "";
      tr.appendChild(document.createElement("td")).textContent = numBn(row.total_fcf_bn);
      names.forEach(function (nm) {
        var td = document.createElement("td");
        var v = row.by_segment_bn && row.by_segment_bn[nm];
        td.textContent = v != null ? numBn(v) : "—";
        tr.appendChild(td);
      });
      tbody1.appendChild(tr);
    });
    tb1.appendChild(thead1);
    tb1.appendChild(tbody1);

    var roll = bs.segment_independent_roll_bn || [];
    var tb2 = document.getElementById("tb-biz-roll");
    var thead2 = document.createElement("thead");
    var hr2 = document.createElement("tr");
    hr2.appendChild(document.createElement("th")).textContent = "期间";
    names.forEach(function (nm) {
      var th = document.createElement("th");
      th.textContent = nm.length > 14 ? nm.slice(0, 12) + "…" : nm;
      hr2.appendChild(th);
    });
    hr2.appendChild(document.createElement("th")).textContent = "分项加总";
    thead2.appendChild(hr2);
    var tbody2 = document.createElement("tbody");
    roll.forEach(function (row) {
      var tr = document.createElement("tr");
      tr.appendChild(document.createElement("td")).textContent = row.period || "";
      names.forEach(function (nm) {
        var td = document.createElement("td");
        var v = row[nm];
        td.textContent = v != null ? numBn(v) : "—";
        tr.appendChild(td);
      });
      var tdSum = document.createElement("td");
      tdSum.textContent = row._independent_sum_bn != null ? numBn(row._independent_sum_bn) : "—";
      tr.appendChild(tdSum);
      tbody2.appendChild(tr);
    });
    tb2.appendChild(thead2);
    tb2.appendChild(tbody2);
  }

  renderBusinessSplit(data.business_split, m.years || 10);

  if (fillTable("tb-segment", data.segment_detail))
    document.getElementById("sec-segment").style.display = "block";

  function fillFcfTableFormatted(payload) {
    if (!payload || !payload.columns) return;
    var tb = document.getElementById("tb-fcf");
    var thead = document.createElement("thead");
    var hr = document.createElement("tr");
    hr.appendChild(document.createElement("th")).textContent = " ";
    payload.columns.forEach(function (c) {
      var th = document.createElement("th");
      th.textContent = c;
      hr.appendChild(th);
    });
    thead.appendChild(hr);
    var tbody = document.createElement("tbody");
    payload.index.forEach(function (rowName, ri) {
      var tr = document.createElement("tr");
      var t0 = document.createElement("td");
      t0.textContent = rowName;
      tr.appendChild(t0);
      payload.data[ri].forEach(function (cell, ci) {
        var td = document.createElement("td");
        var colName = String(payload.columns[ci] || "");
        if (typeof cell === "number" && isFinite(cell)) {
          if (colName.indexOf("折现因子") >= 0)
            td.textContent = cell.toFixed(4);
          else
            td.textContent = cell.toFixed(2);
        } else if (cell == null || cell === "")
          td.textContent = "—";
        else
          td.textContent = String(cell);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    tb.appendChild(thead);
    tb.appendChild(tbody);
  }

  fillFcfTableFormatted(data.fcf_table);

  const ib = data.investment_breakdown_bn;
  if (ib && Object.keys(ib).length) {
    document.getElementById("sec-inv-bd").style.display = "block";
    const tb = document.getElementById("tb-inv");
    const tbody = document.createElement("tbody");
    Object.keys(ib).forEach(function (k) {
      const tr = document.createElement("tr");
      tr.appendChild(document.createElement("td")).textContent = k;
      tr.appendChild(document.createElement("td")).textContent = numBn(ib[k]);
      tbody.appendChild(tr);
    });
    tb.appendChild(tbody);
  }
})();
  </script>
